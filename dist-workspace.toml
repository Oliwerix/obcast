# dist (formerly cargo-dist) packaging config — https://opensource.axo.dev/cargo-dist/
#
# Only the encoder client is packaged as downloadable binaries: it's the
# cross-platform GUI app operators run at the OB site. The server ships as a
# Docker image (see the repo-root Dockerfile) and is opted out of dist via
# `dist = false` in crates/obcast-server/Cargo.toml.
#
# `.github/workflows/release.yml` is generated from this file by `dist generate-ci` —
# don't hand-edit the workflow, edit this config and regenerate instead.

[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
